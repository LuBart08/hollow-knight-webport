const lt=document.getElementById("loading-text"),cv=document.getElementById("unity-canvas"),mw=document.getElementById("unity-mobile-warning"),fg=document.getElementById("fps-graph"),fc=document.getElementById("fps-canvas"),sbw=document.getElementById("share-btn"),stb=document.getElementById("stats-btn"),stp=document.getElementById("stats-panel");let lb=0,hd=false,tm_id;const tm='912.81',fh=[],ml=90;fc.width=180;fc.height=50;const ctx=fc.getContext('2d');let lft=performance.now(),fr=0,fps=60,sb;function uf(){const nt=performance.now(),dt=(nt-lft)/1000;lft=nt;fps=dt>0?1/dt:60;fr++;if(fr%3===0){fh.push(fps);if(fh.length>ml)fh.shift();ctx.clearRect(0,0,180,50);for(let i=0;i<fh.length;i++){const f=fh[i],h=Math.min(f/60,1)*35,c=f>50?'#0f0':f>30?'#fa0':'#f33';ctx.fillStyle=c;ctx.fillRect(i*2,50-h,1.8,h);}ctx.fillStyle='#fff';ctx.font='bold 13px monospace';ctx.shadowColor='#000';ctx.shadowBlur=4;ctx.fillText(Math.round(fps)+' FPS',6,16);ctx.shadowBlur=0;}requestAnimationFrame(uf);}function shw(){hd=false;fg.classList.remove('hidden');if(sb)sb.classList.remove('hidden');}function rst(){clearTimeout(tm_id);if(!hd){hd=true;fg.classList.add('hidden');if(sb)sb.classList.add('hidden');}tm_id=setTimeout(shw,5000);}document.addEventListener('keydown',rst);if(sbw){sbw.addEventListener('click',async()=>{const url=location.href,title=document.title,text='Joue ici';if(navigator.share){try{await navigator.share({title,text,url});return;}catch(e){}}if(navigator.clipboard){try{await navigator.clipboard.writeText(url);alert('Lien copié');return;}catch(e){}}prompt('Copie ce lien :',url);});}if(stb&&stp){stb.addEventListener('click',()=>{stp.classList.toggle('hidden');});}window.HK_StatsUpdate=function(s){if(!s||typeof s!=='object')return;const hp=document.getElementById('stat-hp'),m=document.getElementById('stat-masks'),so=document.getElementById('stat-soul'),g=document.getElementById('stat-geo'),a=document.getElementById('stat-area'),t=document.getElementById('stat-time');if(hp&&s.hp!=null)hp.textContent=s.hp;if(m&&s.masks!=null)m.textContent=s.masks;if(so&&s.soul!=null)so.textContent=s.soul;if(g&&s.geo!=null)g.textContent=s.geo;if(a&&s.area!=null)a.textContent=s.area;if(t&&s.time!=null)t.textContent=s.time;};if(/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)){const m=document.createElement('meta');m.name='viewport';m.content='width=device-width,height=device-height,initial-scale=1,user-scalable=no,shrink-to-fit=yes';document.head.appendChild(m);mw.style.display="block";setTimeout(()=>mw.style.display="none",5000);}async function fwp(u){const r=await fetch(u),rd=r.body.getReader(),ch=[];while(true){const{done,value}=await rd.read();if(done)break;lb+=value.length;ch.push(value);lt.textContent=`${(lb/1048576).toFixed(2)} MB / ${tm} MB`;}return URL.createObjectURL(new Blob(ch));}async function mf(p){const b=await Promise.all(p.map(fwp)),bl=await Promise.all(b.map(u=>fetch(u).then(r=>r.blob())));return URL.createObjectURL(new Blob(bl));}function gp(f,s,e){return Array.from({length:e-s+1},(_,i)=>`${f}.part${s+i}`);}(async()=>{const[du,wu]=await Promise.all([mf(gp("Build/hktruffled.data",1,45)),mf(gp("Build/hktruffled.wasm",1,2))]),sc=document.createElement("script");sc.src="Build/hktruffled.loader.js";sc.onload=()=>{createUnityInstance(cv,{dataUrl:du,frameworkUrl:"Build/hktruffled.framework.js",codeUrl:wu,streamingAssetsUrl:"StreamingAssets",companyName:"Team Cherry",productName:"Hollow Knight",productVersion:"1.0"}).then(()=>{lt.remove();asb();fg.style.display='block';uf();}).catch(alert);};document.body.appendChild(sc);})();function asb(){sb=document.createElement('button');sb.className='savebtn';sb.textContent='download';sb.onclick=sdl;document.body.appendChild(sb);}function odb(n){return new Promise((ok,bd)=>{const r=indexedDB.open(n);r.onsuccess=()=>ok(r.result);r.onerror=()=>bd(r.error);});}function ga(d,s){return new Promise((ok,bd)=>{const t=d.transaction([s],'readonly'),st=t.objectStore(s),r=st.getAll();r.onsuccess=()=>ok(r.result);r.onerr
